name: Scrobblr
options:
  bundleIdPrefix: app.scrobblr
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: complete
  configs:
    Release:
      # Notarization requires a secure (RFC 3161) timestamp and no
      # get-task-allow entitlement. Both are off in Xcode's defaults.
      OTHER_CODE_SIGN_FLAGS: "--timestamp"
      CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
      ENABLE_DEBUG_DYLIB: NO
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      GCC_OPTIMIZATION_LEVEL: "s"

targets:
  Scrobblr:
    type: application
    platform: macOS
    sources:
      - path: Scrobblr
        excludes:
          - "Info.plist"
          - "Scrobblr.entitlements"
    info:
      path: Scrobblr/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        CFBundleShortVersionString: "0.1.4"
        CFBundleVersion: "5"
        NSAppleEventsUsageDescription: "Scrobblr reads the currently playing track from the Music app so it can submit it to Last.fm."
        NSHumanReadableCopyright: "© 2026 Ashar Ahmed. Not affiliated with Last.fm or Apple."
        LSApplicationCategoryType: public.app-category.music
        # Sparkle: replace SUFeedURL with your real appcast URL when you
        # publish releases, and SUPublicEDKey with the EdDSA public key
        # printed by `generate_keys` (paired private key in your keychain
        # for `sign_update`).
        SUFeedURL: "https://asharahmed.github.io/scrobblr/appcast.xml"
        SUPublicEDKey: "NpHc7trjf/AkGqZrcHXP/bLLtZdjn16L2KwwEmk60Ns="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    entitlements:
      path: Scrobblr/Scrobblr.entitlements
      properties:
        # Hardened-runtime requires this to send AppleEvents at all. TCC
        # gates which target apps the user has authorised; we only ever
        # talk to com.apple.Music. The previous build also declared a
        # `temporary-exception.apple-events` entry but that key is sandbox-
        # only and has no effect on this (non-sandboxed) app. dropped.
        com.apple.security.automation.apple-events: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.scrobblr.Scrobblr
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Sparkle

  ScrobblrTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ScrobblrTests
    dependencies:
      - target: Scrobblr
